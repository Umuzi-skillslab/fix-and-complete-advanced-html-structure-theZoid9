<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Media Production Company</h1>
    </header>

    <nav class="media-nav">
        <h1>Media Gallery</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="media.html">Media</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    <main>

        <section class="video-showcase">
            <figure >
                <h2>Video Showcase</h2>
               
                <video  controls width="640" height="360">
                    <source src="media/sample1.mp4" type="video/mp4">
                </video>

                <video controls width="640" height="360">
                    <source src="media/sample2.mp4" type="video/mp4">
                </video>
              
            </figure>
        </section>
        
        <section class="audio-sample">
            <figure>
                <h2>Audio Sample</h2>
                 <audio controls>
                    <source src="media/sample_audio.mp3" type="audio/mpeg">
                     Your browser does not support the audio element
                 </audio>
                <p>Listen to our audio production quality</p>
            </figure>
        </section>
      
        <section class="location">
            <article>
                <h2>Location</h2>
                <iframe 
                    src="https://www.google.com/maps?q=123+Media+Street&output=embed" 
                    style="border:0; width:100%; height:100%;"
                    allowfullscreen="" 
                    loading="lazy">
                </iframe>
                <p>Visit our studio at 123 Media Street</p>
            </article>
        </section>
        <section class="client">
            <article>
                <h2>Client Testimonials</h2>
                <figure>
                    <img src="images/client1.jpg" alt="image4">
                    <figcaption>Jane Doe - CEO, TechCorp</figcaption>
                </figure>
                <figure>
                    <img src="images/client2.jpg" alt="image5">
                     <figcaption>John Smith - Director, DesignStudio</figcaption>
                </figure>
            </article>
        </section>
    </main>
    
    <footer>
         <div class="bottom">
             <p>Email: contact@mediaproduction.com</p>
         </div>
    </footer>
    

</body>
</html>
